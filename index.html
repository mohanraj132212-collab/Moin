<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>C. அழகர்சந்தர்
கேட்டரிங் & சர்வீஸ்</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&display=swap" rel="stylesheet">

<!-- html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

:root{
  --red:#b91c1c;
  --green:#166534;
  --green-light:#dcfce7;
  --gold:#92400e;
  --cream:#fffbf5;
  --border:#d1d5db;
  --text:#1c1917;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Noto Sans Tamil',sans-serif;
}

body{
  background:var(--cream);
  padding:30px 20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.app-card{
  background:white;
  border-radius:14px;
  border-top:4px solid var(--red);
  padding:28px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.app-header{
  text-align:center;
  margin-bottom:25px;
}

.app-header h1{
  color:var(--green);
  margin-bottom:10px;
}

.app-header p{
  color:#666;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.btn{
  border:none;
  padding:11px 20px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.start-btn{
  background:var(--green);
}

.stop-btn{
  background:var(--red);
}

.pdf-btn{
  background:var(--gold);
}

.clear-btn{
  background:#6b7280;
}

.add-btn{
  background:#ea580c;
}

.status{
  background:#fef3c7;
  padding:12px;
  border-radius:8px;
  text-align:center;
  margin-bottom:18px;
  font-weight:bold;
}

.spoken-box{
  background:#f8fafc;
  border-left:4px solid var(--red);
  padding:14px;
  border-radius:8px;
  margin-bottom:20px;
}

#spokenText{
  margin-top:8px;
  font-size:18px;
}

.section-title{
  color:var(--green);
  font-size:20px;
  margin-bottom:15px;
}

#nameList{
  list-style:none;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:10px;
}

.name-item{
  background:#fafafa;
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.name-item.selected{
  background:var(--green-light);
  border:2px solid var(--green);
}

.name-item input{
  width:18px;
  height:18px;
}

.footer{
  margin-top:30px;
  text-align:center;
  color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="app-card">

<div class="app-header">

<h1>
C. அழகர்சந்தர்
கேட்டரிங் & சர்வீஸ்
</h1>



</div>

<div class="controls">

<button
class="btn start-btn"
id="startBtn">
Start
</button>

<button
class="btn stop-btn"
id="stopBtn">
Stop
</button>

<button
class="btn pdf-btn"
id="downloadBtn">
Download PDF
</button>

<button
class="btn clear-btn"
id="clearBtn">
 Clear
</button>

<button
class="btn add-btn"
id="addBtn">
New Menu
</button>

</div>

<div
class="status"
id="status">

 Waiting to start...

</div>

<div class="spoken-box">

<h3>
Last Spoken Text
</h3>

<div id="spokenText">
---
</div>

</div>

<div class="section-title">
Guest List
</div>

<ul id="nameList"></ul>

<div class="footer">
Firebase Voice Recognition System
</div>

</div>
</div>

<script type="module">

// FIREBASE
import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getDatabase,
ref,
push,
onValue

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// FIREBASE CONFIG
const firebaseConfig = {

apiKey:
"AIzaSyDfECeMe-lm4aV8Ft8PAEBG1GQNFGuepl4",

authDomain:
"azhagarsundar-70a3c.firebaseapp.com",

databaseURL:
"https://azhagarsundar-70a3c-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:
"azhagarsundar-70a3c",

storageBucket:
"azhagarsundar-70a3c.firebasestorage.app",

messagingSenderId:
"809335887617",

appId:
"1:809335887617:web:670e9f30a5b6c4734fed00",

measurementId:
"G-1E8TZ2CWRD"

};

// INIT
const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

// ELEMENTS
const nameList =
document.getElementById("nameList");

const spokenText =
document.getElementById("spokenText");

const statusDiv =
document.getElementById("status");

let names = [];

// LOAD NAMES
function loadNames(){

const guestRef =
ref(db,"guestNames");

onValue(
guestRef,
(snapshot)=>{

nameList.innerHTML = "";

names = [];

const data =
snapshot.val();

let index = 0;

for(let id in data){

const item =
data[id];

names.push(item.name);

const li =
document.createElement("li");

li.className =
"name-item";

li.innerHTML = `

<input
type="checkbox"
id="check-${index}">

<label>
${item.name}
</label>

`;

li.addEventListener(
"click",
(e)=>{

if(
e.target.tagName
!== "INPUT"
){

const cb =
li.querySelector(
"input"
);

cb.checked =
!cb.checked;

li.classList.toggle(
"selected",
cb.checked
);

}

});

li.querySelector("input")
.addEventListener(
"change",
(e)=>{

li.classList.toggle(
"selected",
e.target.checked
);

});

nameList.appendChild(li);

index++;

}

});
}

loadNames();

// ADD NAME
document
.getElementById("addBtn")
.addEventListener(
"click",
()=>{

const newName =
prompt(
"Enter New Name"
);

if(!newName) return;

push(

ref(
db,
"guestNames"
),

{
name:newName
}

);

alert(
"✅ Name Added"
);

});

// SPEECH
const SpeechRecognition =

window.SpeechRecognition ||

window.webkitSpeechRecognition;

const recognition =
new SpeechRecognition();

recognition.continuous = true;

recognition.interimResults = true;

recognition.lang = "ta-IN";

let listening = false;

// START
document
.getElementById("startBtn")
.addEventListener(
"click",
()=>{

listening = true;

recognition.start();

statusDiv.innerHTML =
"🎙 Listening continuously...";

});

// STOP
document
.getElementById("stopBtn")
.addEventListener(
"click",
()=>{

listening = false;

recognition.stop();

statusDiv.innerHTML =
"⏹ Voice stopped";

});

// MATCH
function similarMatch(
spoken,
actual
){

spoken =
spoken.toLowerCase();

actual =
actual.toLowerCase();

if(
spoken.includes(actual)
){
return true;
}

const first =
actual.split(" ")[0];

if(
spoken.includes(first)
){
return true;
}

return false;

}

// RESULT
recognition.onresult =
(event)=>{

let transcript = "";

for(

let i =
event.resultIndex;

i <
event.results.length;

i++

){

transcript +=

event.results[i][0]
.transcript + " ";

}

transcript =
transcript.toLowerCase();

spokenText.innerHTML =
transcript;

names.forEach(
(name,index)=>{

if(

similarMatch(
transcript,
name
)

){

const checkbox =

document
.getElementById(

`check-${index}`

);

checkbox.checked =
true;

checkbox.parentElement
.classList.add(
"selected"
);

}

});

};

// AUTO RESTART
recognition.onend = ()=>{

if(listening){

recognition.start();

}

};

// PDF DOWNLOAD
document
.getElementById("downloadBtn")
.addEventListener(
"click",
()=>{

const selectedNames = [];

names.forEach(
(name,index)=>{

const checkbox =

document
.getElementById(
`check-${index}`
);

if(
checkbox &&
checkbox.checked
){

selectedNames.push(name);

}

});

const pdfContent =

document.createElement("div");

pdfContent.style.padding =
"30px";

pdfContent.style.fontFamily =
"'Noto Sans Tamil', sans-serif";

pdfContent.innerHTML = `

<div
style="
text-align:center;
border-bottom:2px solid #b91c1c;
padding-bottom:20px;
margin-bottom:20px;
">

<h1
style="
color:#166534;
margin-bottom:10px;
">
C. அழகர்சந்தர்
கேட்டரிங் & சர்வீஸ்
</h1>

<p>
  பளுவஞ்சி, மருங்காபுரி தாலுகா, திருச்சி மாவட்டம்
</p>

<p
style="
margin-top:10px;
font-weight:bold;
color:#b91c1c;
">
Cell :
9894271043 |
9944973450 |
7708759017
</p>

</div>

<h2
style="
color:#166534;
margin-bottom:20px;
">

</h2>

<ul>

${selectedNames.map(name => `

<li
style="
margin-bottom:10px;
font-size:18px;
">
${name}
</li>

`).join("")}

</ul>

`;

html2pdf()

.set({

margin:0.5,

filename:
"C_Azhagarsundar_Catering.pdf",

image:{
type:"jpeg",
quality:1
},

html2canvas:{
scale:2
},

jsPDF:{
unit:"in",
format:"a4",
orientation:"portrait"
}

})

.from(pdfContent)

.save();

});

// CLEAR
document
.getElementById("clearBtn")
.addEventListener(
"click",
()=>{

document

.querySelectorAll(
"input[type='checkbox']"
)

.forEach((cb)=>{

cb.checked = false;

cb.parentElement
.classList.remove(
"selected"
);

});

spokenText.innerHTML =
"---";

});

</script>

</body>
</html>
